<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码下载 - PC端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            padding: 60px 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 480px;
            width: 90%;
        }
        
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2rem;
            color: #1a1a1a;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1rem;
            margin-bottom: 40px;
        }
        
        .qrcode-container {
            background: #f8f9fa;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            display: inline-block;
        }
        
        .qrcode-placeholder {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
        }
        
        .qrcode-placeholder .icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        
        .qrcode-placeholder .text {
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .instructions {
            background: #f0f7ff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .instructions h3 {
            font-size: 1rem;
            color: #333;
            margin-bottom: 12px;
        }
        
        .instructions ol {
            text-align: left;
            padding-left: 20px;
            color: #555;
            font-size: 0.9rem;
            line-height: 1.8;
        }
        
        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .feature-item {
            text-align: center;
        }
        
        .feature-icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }
        
        .feature-text {
            font-size: 0.85rem;
            color: #666;
        }
        
        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 40px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }
        
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="badge">💻 PC端</span>
        
        <h1>📱 下载移动端 App</h1>
        <p class="subtitle">扫描下方二维码，快速下载体验</p>
        
        <div class="qrcode-container">
            <div class="qrcode-placeholder">
                <span class="icon">⬜</span>
                <span class="text">二维码占位符</span>
                <span style="font-size: 0.8rem; color: #999; margin-top: 5px;">200 × 200</span>
            </div>
        </div>
        
        <div class="instructions">
            <h3>📋 使用说明</h3>
            <ol>
                <li>打开手机微信或其他扫码工具</li>
                <li>扫描左侧二维码</li>
                <li>点击下载按钮安装应用</li>
                <li>注册登录后即可使用全部功能</li>
            </ol>
        </div>
        
        <div class="features">
            <div class="feature-item">
                <div class="feature-icon">⚡</div>
                <div class="feature-text">流畅体验</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🔒</div>
                <div class="feature-text">安全可靠</div>
            </div>
            <div class="feature-item">
                <div class="feature-icon">🎁</div>
                <div class="feature-text">专属优惠</div>
            </div>
        </div>
        
        <a href="#" class="download-btn">立即下载</a>
        
        <div class="footer">
            <p>© 2024 UA-Redirect App - PC端页面</p>
        </div>
    </div>
</body>
</html>
