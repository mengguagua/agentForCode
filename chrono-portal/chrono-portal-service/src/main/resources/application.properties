# MySQL Database Configuration - 连接已存在的数据库
spring.datasource.url=jdbc:mysql://116.198.198.109:3306/chrono_portal?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
